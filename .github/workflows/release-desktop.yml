name: Desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag matching package.json (for example v0.1.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  macos:
    name: Build and publish macOS desktop release
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/agent/go.mod
          cache-dependency-path: apps/api/agent/go.sum

      - name: Sync version from tag
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const version = process.env.RELEASE_TAG.replace(/^v/, '');
          console.log(`Syncing version ${version} across monorepo...`);
          const files = [
            'package.json',
            'apps/api/package.json',
            'apps/desktop/package.json',
            'apps/web/package.json',
            'apps/web-e2e/package.json'
          ];
          for (const file of files) {
            const filePath = path.join(process.cwd(), file);
            if (fs.existsSync(filePath)) {
              const pkg = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              pkg.version = version;
              fs.writeFileSync(filePath, JSON.stringify(pkg, null, 2) + '\n');
              console.log(`Updated ${file}`);
            }
          }
          NODE

      - name: Install dependencies
        run: |
          python -m pip install poetry==2.1.2
          pnpm install --frozen-lockfile
          poetry -C apps/api/api install --no-root

      - name: Build verified desktop packages
        run: pnpm --filter @repolume/desktop release

      - name: Run macOS smoke test
        run: apps/desktop/dist/mac-*/RepoLume.app/Contents/MacOS/RepoLume --smoke-test

      - name: Create checksums
        run: shasum -a 256 apps/desktop/dist/RepoLume-*.dmg apps/desktop/dist/RepoLume-*-mac.zip > apps/desktop/dist/SHA256SUMS.txt

      - name: Retain build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repolume-${{ env.RELEASE_TAG }}-macos
          path: |
            apps/desktop/dist/RepoLume-*.dmg
            apps/desktop/dist/RepoLume-*-mac.zip
            apps/desktop/dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        run: |
          assets=(
            apps/desktop/dist/RepoLume-*.dmg
            apps/desktop/dist/RepoLume-*-mac.zip
            apps/desktop/dist/SHA256SUMS.txt
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "RepoLume ${RELEASE_TAG#v}" \
              --generate-notes \
              --latest
          fi

  windows:
    name: Build and publish Windows desktop release
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/agent/go.mod
          cache-dependency-path: apps/api/agent/go.sum

      - name: Sync version from tag
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const version = process.env.RELEASE_TAG.replace(/^v/, '');
          console.log(`Syncing version ${version} across monorepo...`);
          const files = [
            'package.json',
            'apps/api/package.json',
            'apps/desktop/package.json',
            'apps/web/package.json',
            'apps/web-e2e/package.json'
          ];
          for (const file of files) {
            const filePath = path.join(process.cwd(), file);
            if (fs.existsSync(filePath)) {
              const pkg = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              pkg.version = version;
              fs.writeFileSync(filePath, JSON.stringify(pkg, null, 2) + '\n');
              console.log(`Updated ${file}`);
            }
          }
          NODE

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install poetry==2.1.2
          pnpm install --frozen-lockfile
          poetry -C apps/api/api install --no-root

      - name: Build verified desktop packages
        shell: bash
        run: pnpm --filter @repolume/desktop release

      - name: Run Windows smoke test
        shell: bash
        run: apps/desktop/dist/win-unpacked/RepoLume.exe --smoke-test

      - name: Create checksums
        shell: bash
        run: sha256sum apps/desktop/dist/*.exe > apps/desktop/dist/SHA256SUMS-win.txt

      - name: Retain build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repolume-${{ env.RELEASE_TAG }}-windows
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/SHA256SUMS-win.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: bash
        run: |
          # Use find to locate exe files reliably
          shopt -s nullglob
          assets=( apps/desktop/dist/*.exe apps/desktop/dist/SHA256SUMS-win.txt )
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No assets found"
            exit 1
          fi
          
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "RepoLume ${RELEASE_TAG#v}" \
              --generate-notes \
              --latest
          fi
