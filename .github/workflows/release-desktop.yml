name: Desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag matching package.json (for example v0.1.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  macos:
    name: Build and publish macOS desktop release
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Verify release tag
        run: |
          node <<'NODE'
          const metadata = require('./package.json');
          const expected = `v${metadata.version}`;
          if (process.env.RELEASE_TAG !== expected) {
            console.error(`Release tag ${process.env.RELEASE_TAG} must match package version ${expected}`);
            process.exit(1);
          }
          NODE

      - name: Install dependencies
        run: |
          python -m pip install poetry==2.1.2
          pnpm install --frozen-lockfile
          poetry -C api install --no-root

      - name: Build verified desktop packages
        run: pnpm release:desktop

      - name: Create checksums
        run: shasum -a 256 dist/RepoLume-*.dmg dist/RepoLume-*-mac.zip > dist/SHA256SUMS.txt

      - name: Retain build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repolume-${{ env.RELEASE_TAG }}-macos
          path: |
            dist/RepoLume-*.dmg
            dist/RepoLume-*-mac.zip
            dist/latest-mac.yml
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        run: |
          assets=(
            dist/RepoLume-*.dmg
            dist/RepoLume-*-mac.zip
            dist/latest-mac.yml
            dist/SHA256SUMS.txt
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --target "$GITHUB_SHA" \
              --title "RepoLume ${RELEASE_TAG#v}" \
              --generate-notes \
              --latest
          fi
